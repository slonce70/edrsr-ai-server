<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="results.pageTitle">Результаты анализа - ЄДРСР AI</title>
    <style>
      :root {
        --primary-color: #667eea;
        --secondary-color: #764ba2;
        --text-color: #2c3e50;
        --bg-light: #f8f9fa;
        --border-color: #e9ecef;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-light);
        color: var(--text-color);
        line-height: 1.6;
      }
      .container {
        max-width: 1200px;
        margin: 20px auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative; /* For positioning the edit container */
      }
      .header h1 {
        font-size: 24px;
        cursor: pointer;
      }
      .edit-icon {
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 18px;
        margin-left: 15px;
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      .edit-icon:hover {
        opacity: 1;
      }
      .edit-icon:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.75);
        outline-offset: 3px;
      }
      .title-edit-container {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .title-edit-container input {
        font-size: 20px;
        padding: 5px;
        border-radius: 4px;
        border: 1px solid #ccc;
        width: 400px;
      }
      .title-edit-container button {
        padding: 5px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .hidden {
        display: none !important;
      }
      .status-badge {
        padding: 6px 12px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 14px;
      }
      .status-completed {
        background-color: #28a745;
        color: white;
      }
      .status-analyzing,
      .status-downloading,
      .status-queued,
      .status-retrying,
      .status-processing {
        background-color: #ffc107;
        color: #333;
      }
      .status-error {
        background-color: #dc3545;
        color: white;
      }
      .status-loading {
        background-color: #6c757d;
        color: white;
      }

      .main-content {
        display: flex;
      }
      .sidebar {
        width: 300px;
        border-right: 1px solid var(--border-color);
        padding: 20px;
        background: #fdfdff;
      }
      .sidebar h3 {
        margin-bottom: 15px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
      }
      .sidebar ul {
        list-style: none;
        padding: 0;
      }
      .sidebar li {
        margin-bottom: 10px;
        font-size: 14px;
      }
      .sidebar li strong {
        color: #555;
      }
      .content-area {
        flex-grow: 1;
        padding: 30px;
        max-height: 80vh;
        overflow-y: auto;
      }
      .controls {
        margin-top: 20px;
      }
      .button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .button-primary {
        background: var(--primary-color);
        color: white;
      }
      .button-secondary {
        background: var(--secondary-color);
        color: white;
      }
      .result-content {
        line-height: 1.7;
      }
      .result-content h2 {
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 8px;
        margin-top: 20px;
        margin-bottom: 15px;
      }
      .result-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }
      .result-content th,
      .result-content td {
        border: 1px solid var(--border-color);
        padding: 12px;
        text-align: left;
      }
      .result-content th {
        background-color: var(--bg-light);
      }
      .error-message {
        color: #721c24;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        padding: 15px;
        border-radius: 8px;
      }

      #chatArea {
        padding: 0 20px 20px 20px;
      }
      .chat-header {
        padding: 15px 0;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 15px;
      }
      .chat-history {
        max-height: 400px;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg-light);
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .chat-message {
        display: flex;
        margin-bottom: 15px;
        line-height: 1.5;
      }
      .chat-message .role {
        font-weight: bold;
        width: 60px;
        flex-shrink: 0;
        color: var(--secondary-color);
      }
      .chat-message.user .role {
        color: var(--primary-color);
      }
      .chat-form {
        display: flex;
        gap: 10px;
        position: relative;
      }
      .chat-form input {
        flex-grow: 1;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        font-size: 14px;
      }
      .chat-form .button {
        flex-shrink: 0;
        width: auto;
      }
      .chat-thinking {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        color: #666;
        font-size: 14px;
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(0, 0, 0, 0.1);
        border-top-color: var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(365deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 id="jobTitle" data-i18n="common.loading">Загрузка...</h1>
        <div id="statusBadge" class="status-badge status-loading" data-i18n="common.loading">
          Загрузка...
        </div>
      </header>

      <main class="main-content">
        <aside class="sidebar">
          <h3 data-i18n="results.metadataTitle">Метаданные задания</h3>
          <ul id="jobMetadata">
            <!-- Metadata will be rendered here by JS -->
          </ul>
          <div class="controls">
            <button id="copyBtn" class="button button-primary" data-i18n="results.copyReportBtn">
              📋 Копировать отчёт
            </button>
            <div class="pdf-download-group" style="margin-top: 10px">
              <button id="downloadPdfBtn" class="button button-primary" disabled>
                <span class="btn-text" data-i18n="results.pdfBtnLoading">
                  ⏳ Загрузка библиотек...
                </span>
                <span class="spinner" style="display: none"></span>
              </button>
              <select
                id="pdfTypeSelect"
                class="pdf-type-select"
                style="
                  margin-top: 5px;
                  width: 100%;
                  padding: 8px;
                  border-radius: 4px;
                  border: 1px solid #ccc;
                "
              >
                <option value="text" data-i18n="results.pdfTypeText">
                  📄 Текстовый файл (TXT, небольшой размер)
                </option>
                <option value="pdf" data-i18n="results.pdfTypeRich">
                  📄 PDF (текст, кликабельные ссылки)
                </option>
                <option value="image" data-i18n="results.pdfTypeImage">
                  🖼️ PDF (изображение, точное оформление)
                </option>
              </select>
            </div>
            <button
              id="downloadBtn"
              class="button button-secondary"
              style="margin-top: 10px; display: none"
              data-i18n="results.downloadCasesBtn"
            >
              📄 Скачать дела
            </button>
          </div>
        </aside>
        <section class="content-area">
          <div id="analysisResult" class="result-content">
            <p data-i18n="results.analysisLoading">Получение данных от сервис-воркера...</p>
          </div>
        </section>
      </main>

      <section id="chatArea" style="display: none">
        <div class="chat-header">
          <h3 data-i18n="results.chatTitle">💬 Чат с результатами анализа</h3>
        </div>
        <div id="chatHistory" class="chat-history"></div>
        <form id="chatForm" class="chat-form">
          <div id="chatThinking" class="chat-thinking" style="display: none">
            <div class="spinner"></div>
            <span data-i18n="results.chatThinking">ИИ думает...</span>
          </div>
          <input
            type="text"
            id="chatInput"
            data-i18n-placeholder="results.chatPlaceholder"
            placeholder="Задайте уточняющий вопрос..."
            autocomplete="off"
            disabled
          />
          <button
            type="submit"
            id="chatSendBtn"
            class="button button-primary"
            disabled
            data-i18n="results.chatSend"
          >
            Отправить
          </button>
        </form>
      </section>
    </div>

    <script src="html2canvas.min.js"></script>
    <script src="marked.min.js"></script>
    <script src="jspdf.umd.min.js"></script>
    <script src="results.js" type="module"></script>
  </body>
</html>
