name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            web/package-lock.json

      - name: Install deps
        run: |
          npm ci
          npm --prefix server ci
          npm --prefix web ci

      - name: Quality (lint + prettier)
        run: npm run quality:check

      - name: Web lint
        run: npm run web:lint

      - name: Web build
        run: npm run web:build

      - name: Selfcheck
        run: npm run test:selfcheck

      - name: Scraper parsing tests
        run: node server/scripts/test-scraper-parsing.js

      - name: Prompt assembly tests
        run: node server/scripts/test-prompts.js
