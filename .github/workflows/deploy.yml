name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo -u edrsr bash -lc 'cd /opt/edrsr-ai && git fetch --prune && git reset --hard origin/main && npm install && npm --prefix server install'
            systemctl restart edrsr-ai
