name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo chown -R edrsr:edrsr /opt/edrsr-ai
            sudo -u edrsr bash -lc 'mkdir -p ~/.ssh && chmod 700 ~/.ssh && ssh-keygen -R github.com -f ~/.ssh/known_hosts || true && ssh-keygen -R 140.82.121.4 -f ~/.ssh/known_hosts || true && ssh-keyscan -H github.com >> ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts'
            sudo -u edrsr bash -lc 'cd /opt/edrsr-ai && git fetch --prune && git reset --hard origin/main && npm install && npm --prefix server install && npm --prefix web install && npm --prefix web run build'
            sudo mkdir -p /var/www/edrsr-ai-app
            sudo rsync -a --delete /opt/edrsr-ai/web/dist/ /var/www/edrsr-ai-app/
            systemctl restart edrsr-ai
            systemctl reload nginx
