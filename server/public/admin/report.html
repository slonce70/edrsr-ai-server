<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="reportPage.title">Отчет по заданию - EDRSR-AI Admin</title>
    <link href="vendor/fontawesome/all.min.css" rel="stylesheet" />
    <script src="vendor/marked.min.js"></script>
    <style>
      :root {
        --primary-color: #667eea;
        --secondary-color: #764ba2;
        --text-color: #2c3e50;
        --bg-light: #f8f9fa;
        --border-color: #e9ecef;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-light);
        color: var(--text-color);
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: white;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 24px;
        margin: 0;
      }

      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-light {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-light:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 14px;
      }

      .status-completed {
        background-color: #28a745;
        color: white;
      }

      .status-analyzing,
      .status-downloading,
      .status-queued {
        background-color: #ffc107;
        color: #333;
      }

      .status-error {
        background-color: #dc3545;
        color: white;
      }

      .main-content {
        display: flex;
      }

      .sidebar {
        width: 300px;
        border-right: 1px solid var(--border-color);
        padding: 20px;
        background: #fdfdff;
      }

      .sidebar h3 {
        margin-bottom: 15px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
        color: var(--text-color);
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
      }

      .sidebar li {
        margin-bottom: 10px;
        font-size: 14px;
      }

      .sidebar li strong {
        color: #555;
      }

      .controls {
        margin-top: 20px;
      }

      .button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .button-primary {
        background: var(--primary-color);
        color: white;
      }

      .button-primary:hover {
        background: #5a6fd8;
      }

      .button-secondary {
        background: var(--secondary-color);
        color: white;
      }

      .button-secondary:hover {
        background: #6a4190;
      }

      .content-area {
        flex-grow: 1;
        padding: 30px;
        max-height: 80vh;
        overflow-y: auto;
      }

      .result-content {
        line-height: 1.7;
      }

      .result-content h1,
      .result-content h2,
      .result-content h3 {
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 8px;
        margin-top: 20px;
        margin-bottom: 15px;
        color: var(--text-color);
      }

      .result-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }

      .result-content th,
      .result-content td {
        border: 1px solid var(--border-color);
        padding: 12px;
        text-align: left;
      }

      .result-content th {
        background-color: var(--bg-light);
        font-weight: 600;
      }

      .result-content a {
        color: var(--primary-color);
        text-decoration: none;
      }

      .result-content a:hover {
        text-decoration: underline;
      }

      .result-content p {
        margin-bottom: 12px;
      }

      .result-content ul,
      .result-content ol {
        margin-left: 20px;
        margin-bottom: 12px;
      }

      .result-content li {
        margin-bottom: 6px;
      }

      .error-message {
        color: #721c24;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        padding: 15px;
        border-radius: 8px;
        margin: 20px 0;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        .main-content {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border-color);
        }

        .container {
          margin: 10px;
          border-radius: 8px;
        }

        .header {
          padding: 15px 20px;
        }

        .header h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 id="jobTitle" data-i18n="reportPage.loadingTitle">Загрузка отчета...</h1>
        <div class="header-actions">
          <div id="statusBadge" class="status-badge status-completed" data-i18n="common.loading">
            Загрузка...
          </div>
          <a href="/admin" class="btn btn-light">
            <i class="fas fa-arrow-left"></i>
            <span data-i18n="reportPage.backToAdmin">Назад к админке</span>
          </a>
        </div>
      </header>

      <main class="main-content">
        <aside class="sidebar">
          <h3 data-i18n="report.metadataTitle">Інформація про завдання</h3>
          <ul id="jobMetadata">
            <!-- Metadata will be rendered here -->
          </ul>
          <div class="controls">
            <button id="copyBtn" class="button button-primary">
              <i class="fas fa-copy"></i>
              <span data-i18n="reportPage.copyBtn">Копировать отчет</span>
            </button>
            <button id="downloadBtn" class="button button-secondary">
              <i class="fas fa-download"></i>
              <span data-i18n="reportPage.downloadBtn">Скачать TXT</span>
            </button>
            <button id="printBtn" class="button button-secondary">
              <i class="fas fa-print"></i>
              <span data-i18n="reportPage.printBtn">Печать</span>
            </button>
          </div>
        </aside>
        <section class="content-area">
          <div id="analysisResult" class="result-content">
            <div class="loading">
              <div class="spinner"></div>
              <p data-i18n="reportPage.loadingBody">Загрузка отчета...</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="i18n.js"></script>
    <script src="report.js"></script>
  </body>
</html>
